<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта школы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e2e8f0;
            color: #0f172a;
            min-height: 100vh;
            padding: 10px;
        }

        .app {
            max-width: 480px;
            margin: 15px auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #2c5282;
            font-size: 1.8em;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .subtitle {
            color: #718096;
            font-size: 0.95em;
            margin-top: 6px;
        }

        .floor-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .floor-btn {
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            border: 2px solid #bee3f8;
            cursor: pointer;
            background: #ffffff;
            color: #2c5282;
            transition: all 0.2s;
        }

        .floor-btn.active {
            background: #3182ce;
            color: #ffffff;
            border-color: #3182ce;
        }

        .floor-btn:hover {
            background: #ebf8ff;
        }

        .floor-btn.active:hover {
            background: #2c5282;
        }

        .search-section {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            background: #ebf8ff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid #e2e8f0;
            outline: none;
            background: #ffffff;
        }

        input:focus {
            border-color: #3182ce;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: #3182ce;
            color: #ffffff;
        }

        button:hover {
            background: #2c5282;
        }

        .maps {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .map-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 15px;
            flex: 1;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
            border: 1px solid #e2e8f0;
        }

        .map-title {
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 10px;
            color: #2c5282;
            text-align: center;
            padding-bottom: 6px;
            border-bottom: 2px solid #bee3f8;
        }

        .map-title.step-1,
        .map-title.step-2 {
            color: #2c5282;
            border-bottom-color: #3182ce;
        }

        .map-wrapper {
            width: 100%;
            height: 400px;
            background: #f7fafc;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .label {
            font-size: 12px;
            font-weight: 700;
            fill: #2c5282;
            text-anchor: middle;
        }

        .route,
        .route-step-1,
        .route-step-2 {
            stroke: #3182ce;
            stroke-width: 4;
            fill: none;
            opacity: 0.9;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .node {
            fill: #a0aec0;
            stroke: #ffffff;
            stroke-width: 1;
        }

        .room {
            fill: #3182ce;
            stroke: #ffffff;
            stroke-width: 1.5;
            cursor: pointer;
        }

        .staircase {
            fill: #718096;
            stroke: #ffffff;
            stroke-width: 1.5;
            cursor: pointer;
        }

        .entrance {
            fill: #48bb78;
            stroke: #ffffff;
            stroke-width: 2;
        }

        .instructions {
            background: #ebf8ff;
            color: #2c5282;
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            margin-bottom: 15px;
            border: 1px solid #bee3f8;
        }

        .instructions h3 {
            margin-bottom: 10px;
            font-size: 1.1em;
            color: #2c5282;
        }

        .instructions p {
            line-height: 1.5;
            font-size: 0.9em;
            color: #4a5568;
        }

        @media (max-width: 480px) {
            .app {
                padding: 16px;
                margin: 10px;
            }

            h1 {
                font-size: 1.6em;
            }

            .search-section {
                flex-direction: column;
                padding: 12px;
            }

            input,
            button {
                width: 100%;
                padding: 10px;
                font-size: 14px;
            }

            .map-wrapper {
                height: 350px;
            }

            .map-title {
                font-size: 1em;
            }

            .floor-selector {
                gap: 5px;
            }

            .floor-btn {
                padding: 6px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>

<script>
    function switchFloor(floor) 
    {
        currentFloor = floor;
        document.querySelectorAll('.floor-btn').forEach((btn, index) => 
        {
            btn.classList.toggle('active', index + 1 === floor);
        });
        renderMap(null, null);
    }

    function renderMap(path, targetFloor, roomName = '') 
    {
        mapsEl.innerHTML = '';
        if (targetFloor === 2 && path) 
        {
            renderTwoFloorMap(1, 2, path.step1, path.step2, roomName);
        }
        else if (targetFloor === 3 && path) 
        {
            renderTwoFloorMap(1, 3, path.step1, path.step2, roomName);
        }
        else 
        {
            renderSingleFloorMap(currentFloor, path);
        }
    }

    function renderTwoFloorMap(floor1, floor2, path1, path2, roomName) 
    {
        const card1 = createMapCard(`${floor1} этаж, до лестницы`, 'step-1');
        const svg1 = card1.querySelector('svg');
        mapsEl.appendChild(card1);
        drawFloor(floor1, svg1, path1, 'step1');
        const card2 = createMapCard(`${floor2} этаж, до кабинета: ${roomName}`, 'step-2');
        const svg2 = card2.querySelector('svg');
        mapsEl.appendChild(card2);
        drawFloor(floor2, svg2, path2, 'step2');
    }

    function renderSingleFloorMap(floor, path) 
    {
        const card = createMapCard(`${floor} этаж`);
        const svg = card.querySelector('svg');
        mapsEl.appendChild(card);
        drawFloor(floor, svg, path, 'single');
    }

    function createMapCard(title, className = '') 
    {
        const card = document.createElement('div');
        card.className = `map-card ${className}`;
        card.innerHTML = `<div class="map-title ${className}">${title}</div><div class="map-wrapper"><svg viewBox="0 0 500 660"></svg></div>`;
        return card;
    }
</script>

<!-- отрисока карты -->
<script>
    function drawFloor(floor, svg, path, pathType) 
    {
        svg.innerHTML = '';
        const f = floors[floor];
        drawFloorPlan(svg, f.plan);
        drawRoute(svg, f, path, pathType);
        drawFloorNodes(svg, f, floor);
        addClickHandlers(svg, floor);
    }

    function drawFloorPlan(svg, plan) 
    {
        if (!plan) return;
        plan.forEach(street => 
        {
            if (street.type === 'line') 
            {
                let d = '';
                street.points.forEach((point, i) => 
                {
                    d += (i === 0 ? `M${point.x} ${point.y}` : `L${point.x} ${point.y}`);
                });
                svg.insertAdjacentHTML('beforeend', `<path d="${d}" stroke="#718096" stroke-width="1.5" fill="none"/>`);
            }
        });
    }

    function drawRoute(svg, floorData, path, pathType) 
    {
        if (!path) return;
        let routeClass = 'route';
        if (pathType === 'step1') 
        {
            routeClass = 'route-step-1';
        }
        if (pathType === 'step2') 
        {
            routeClass = 'route-step-2';
        }
        const d = path.map((id, i) => 
        {
            const p = floorData.nodes[id];
            return `${i ? 'L' : 'M'}${p.x},${p.y}`;
        }).join(' ');
        svg.insertAdjacentHTML('beforeend', `<path d="${d}" class="${routeClass}"/>`);
    }

    function drawFloorNodes(svg, floorData, floor) 
    {
        Object.entries(floorData.nodes).forEach(([id, n]) => {
            const isEntry = id === 'entry';
            const isStairs = id.startsWith('stairs');
            const isRoom = floorData.rooms[id];
            let radius = isRoom || isStairs ? 8 : (isEntry ? 8 : 0);
            let className = 'node';
            if (isRoom) 
            {
                className = 'room';
            }
            if (isStairs) 
            {
                className = 'staircase';
            }
            if (isEntry) 
            {
                className = 'entrance';
            }
            if (radius > 0) 
            {
                svg.insertAdjacentHTML('beforeend',
                    `<circle cx="${n.x}" cy="${n.y}" r="${radius}" class="${className}"
                    data-room="${isRoom ? id : ''}" data-stairs="${isStairs ? 'true' : 'false'}" data-floor="${floor}"/>`
                );
            }

            if (n.label && (isRoom || isEntry || isStairs)) 
            {
                drawNodeLabel(svg, n, id);
            }
        });
    }

    function drawNodeLabel(svg, node, id) 
    {
        let yOffset = -15;
        let xOffset = 0;
        if (id.startsWith('liom') && id !== 'liom3') 
        {
            xOffset = -25;
            yOffset = 4;
        }
        else if (id === 'entry' || id === 'binom' || id === 'r114' || id === 'liom3' || id === 'r221' || id === 'r222' || id === 'pr') 
        {
            yOffset = 20;
        }
        svg.insertAdjacentHTML('beforeend',
            `<text x="${node.x + xOffset}" y="${node.y + yOffset}" class="label">${node.label}</text>`
        );
    }

    function addClickHandlers(svg, floor) 
    {
        svg.querySelectorAll('[data-room]').forEach(el => {
            if (!el.dataset.room || el.dataset.stairs === 'true') 
            {
                return;
            }
            el.style.cursor = 'pointer';
            el.onclick = () => 
            {
                const roomCode = el.dataset.room;
                if (roomReverseAliases[roomCode]) 
                {
                    roomInput.value = roomReverseAliases[roomCode];
                }
                else 
                {
                    roomInput.value = roomCode.replace('r', '');
                }
                buildRoute();
            };
        });
    }
</script>

<!-- построение пути -->
<script>
        function buildRoute() 
        {
            const room = normalizeInput(roomInput.value);
            if (!room) 
            {
                alert('Пожалуйста, введите номер кабинета или название помещения');
                return;
            }
            const { roomCode, targetFloor } = findRoom(room);
            if (!roomCode) 
            {
                alert('Кабинет не найден!');
                return;
            }
            if (targetFloor !== null && targetFloor !== currentFloor) 
            {
                switchFloor(targetFloor);
            }
            const floor = targetFloor || currentFloor;
            renderRouteForFloor(floor, roomCode);
        }
    
    function normalizeInput(input)
    {
        if (!input) 
        {
            return null;
        }
        return input.trim().toLowerCase().replace(/\s+/g, ' ').replace(/[\-\.]/g, ' ');
    }

    function findRoom(room) 
    {
        let roomCode = null;
        let targetFloor = null;
        if (/^10[1-8]$/.test(room.replace(/\D/g, ''))) 
        {
            roomCode = `r${room.replace(/\D/g, '')}`;
            targetFloor = 1;
        }
        else if (/^11[14]$/.test(room.replace(/\D/g, ''))) 
        {
            roomCode = `r${room.replace(/\D/g, '')}`;
            targetFloor = 1;
        }
        else if (/^20[1-8]$/.test(room.replace(/\D/g, ''))) 
        {
            roomCode = `r${room.replace(/\D/g, '')}`;
            targetFloor = 2;
        }
        else if (/^21[4-9]$/.test(room.replace(/\D/g, ''))) 
        {
            roomCode = `r${room.replace(/\D/g, '')}`;
            targetFloor = 2;
        }
        else if (/^22[12]$/.test(room.replace(/\D/g, ''))) 
        {
            roomCode = `r${room.replace(/\D/g, '')}`;
            targetFloor = 2;
        }
        else if (/^30[1-9]$/.test(room.replace(/\D/g, '')) || /^31[01]$/.test(room.replace(/\D/g, ''))) 
        {
            roomCode = `r${room.replace(/\D/g, '')}`;
            targetFloor = 3;
        }
        else if (roomAliases[room]) 
        {
            roomCode = roomAliases[room];
            targetFloor = getFloorByRoomCode(roomCode);
        }

        if (!targetFloor) 
        {
            targetFloor = findRoomByText(room);
            if (targetFloor) 
            {
                roomCode = getRoomCodeByText(room, targetFloor);
            }
        }
        return { roomCode, targetFloor };
    }

    
    function getFloorByRoomCode(roomCode)
    {
        if (['tk', 'binom', 'liom1', 'liom2', 'liom3'].includes(roomCode)) 
        {
            return 1;
        }
        if (['ny', 'l', 'vr', 'mk', 's', 'pr', 'st'].includes(roomCode)) 
        {
            return 2;
        }
        if (['art', 'a', 'b'].includes(roomCode)) 
        {
            return 3;
        }
        return null;
    }

    function findRoomByText(room) 
    {
        if (room.includes('точка') || room.includes('кипен') || room.includes('тк')) 
        {
            return 1;
        }
        if (room.includes('спорт') || room.includes('физ')) 
        {
            return 1;
        }
        if (room.includes('бином') || room.includes('бино') || room === 'б') 
        {
            return 1;
        }
        if (room.includes('лиом') || room.includes('лио')) 
        {
            return 1;
        }
        if (room === 'ny' || room.includes('new') || room.includes('york'))
        {
            return 2;
        }
        if (room === 'l' || room.includes('lond'))
        {
            return 2;
        }
        if (room === 'vr' || room.includes('V')) 
        {
            return 2;
        }
        if (room === 'mk' || room.includes('ед')) 
        {
            return 2;
        }
        if (room === 's' || room.includes('sydn')) 
        {
            return 2;
        }
        if (room.includes('толов'))
        {
            return 2;
        }
        if (room.includes('прием'))
        {
            return 2;
        }
        if (room === 'art' || room.includes('арт') || room.includes('ориум')) 
        {
            return 3;
        }
        if (room === 'альфа' || room === 'а')
        {
            return 3;
        }
        if (room === 'бетта' || room === 'бет') 
        {
            return 3;
        }
        return null;
    }

    function getRoomCodeByText(room, floor) 
    {
        if (room.includes('очка') || room.includes('ипен') || room.includes('тк')) 
        {
            return 'tk';
        }
        if (room.includes('порт') || room.includes('из')) 
        {
            return 'sport';
        }
        if (room.includes('ином'))
        {
            return 'binom';
        }
        if (room.includes('иом')) 
        {
            const m = room.match(/(\d)/);
            if (m) 
            {
                return `liom${m[1]}`;
            }
        }
        if (room.includes('ew') || room.includes('ork')) 
        {
            return 'ny';
        }
        if (room.includes('don') || room.includes('онд')) 
        {
            return 'l';
        }
        if (room === 'vr' || room.includes('V') || room.includes('v')) 
        {
            return 'vr';
        }
        if (room === 'mk' || room.includes('ед')) 
        {
            return 'mk';
        }
        if (room.includes('ydney') || room.includes('идней')) 
        {
            return 's';
        }
        if (room.includes('толов')) 
        {
            return 'st';
        }
        if (room.includes('рием')) 
        {
            return 'pr';
        }
        if (room.includes('арт') || room.includes('ориум')) 
        {
            return 'art';
        }
        if (room.includes('льфа')) 
        {
            return 'a';
        }
        if (room.includes('ет')) 
        {
            return 'b';
        }
        return null;
    }

    function renderRouteForFloor(floor, roomCode) 
    {
        if (floor === 1) 
        {
            if (!roomPaths1[roomCode]) 
            {
                alert('Кабинет не найден!');
                return;
            }
            renderMap(roomPaths1[roomCode], 1, roomReverseAliases[roomCode] || roomCode);
        }
        else if (floor === 2) 
        {
            if (!roomPaths2[roomCode]) 
            {
                alert('Кабинет не найден!');
                return;
            }
            renderMap(roomPaths2[roomCode], 2, roomReverseAliases[roomCode] || roomCode);
        }
        else if (floor === 3) 
        {
            if (!roomPaths3[roomCode]) 
            {
                alert('Кабинет не найден!');
                return;
            }
            renderMap(roomPaths3[roomCode], 3, roomReverseAliases[roomCode] || roomCode);
        }
    }
</script>

        if (e.key === 'Enter') 
        {
            buildRoute();
        }
    });
